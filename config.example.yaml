llm:
  base_url: "https://api.openai.com/v1"
  api_key: "YOUR_API_KEY_HERE"
  model: "gpt-4.1-mini"
  temperature: 0.2
  max_tokens: 12000
  timeout_seconds: 90
telegram:
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  chat_id: "YOUR_TELEGRAM_CHAT_ID"
kiwoom:
  enabled: false
  mock: false
  base_url: "https://api.kiwoom.com"
  mock_base_url: "https://mockapi.kiwoom.com"
  websocket_url: "wss://api.kiwoom.com:10000"
  mock_websocket_url: "wss://mockapi.kiwoom.com:10000"
  appkey: ""
  secretkey: ""
  token_cache_enabled: true
screening:
  auto_llm_reports: false
  telegram_after_llm_reports: true
  report_output_dir: "log"
  max_llm_report_stocks: 30
  send_summary_to_telegram: true
  telegram_send_as_text: true
  custom_conditions:
    - name: "bullish_value"
      enabled: true
      operand: "AND"
      ma_order: [5, 20, 60]
      ma_above: []
      metrics:
        - metric: "PER"
          op: "<"
          value: 5.0
        - metric: "PBR"
          op: "<"
          value: 0.5
  active_conditions:
    - "bullish_value"
